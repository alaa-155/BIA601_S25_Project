<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title if title else 'BIA601 - نظام توصية للتجارة الإلكترونية' }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/header.css">
  <link rel="stylesheet" href="/static/css/layout.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/pages.css">
  <link rel="stylesheet" href="/static/css/responsive.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="/">
        <span class="brand-copy">
          <strong>نظام التوصيات للتجارة الإلكترونية</strong>
          <small>مشروع عملي لمقرر الخوارزميات الذكية</small>
        </span>
        <span class="brand-mark">BIA</span>
      </a>

      <nav class="site-nav" aria-label="التنقل الرئيسي">
        <a class="{% if page_name == 'home' %}active{% endif %}" href="/">الرئيسية</a>
        <a class="{% if page_name == 'recommendations' %}active{% endif %}" href="/recommendations?user_id=1">التوصيات</a>
      </nav>
    </div>
  </header>

  <main class="container page-content">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
